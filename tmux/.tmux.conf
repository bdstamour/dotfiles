# ~/.tmux.conf
# -----------------------------------------------------------------------------
# Prefix / leader
# -----------------------------------------------------------------------------
# Use Ctrl-a as the leader instead of the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -----------------------------------------------------------------------------
# Default shell — use zsh for new tmux windows/panes.
# Resolved at tmux-server start so it works even before chsh has taken effect
# (i.e. when $SHELL is still /bin/bash from the previous login session).
# -----------------------------------------------------------------------------
run-shell 'tmux set-option -g  default-shell   "$(command -v zsh || echo $SHELL)"'
run-shell 'tmux set-option -g  default-command "$(command -v zsh || echo $SHELL)"'

# -----------------------------------------------------------------------------
# General / sane defaults
# -----------------------------------------------------------------------------
# True color + terminal type (required for pi coding agent and modern TUIs)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:RGB"

# Allow programs to receive focus events (required for pi coding agent)
set -g focus-events on

# Fast key response — avoid delay after pressing Escape (required for pi/vim)
set -sg escape-time 10

# Extended keys (required for pi)
set -g extended-keys on
set -g extended-keys-format csi-u

# Increase scrollback history
set -g history-limit 50000

# Enable mouse support (scroll, select pane, resize)
set -g mouse on

# Reduce repeat timeout for bound keys
set -g repeat-time 500

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Larger display time for messages
set -g display-time 2000

# Set terminal window title to reflect current program
set -g set-titles on
set -g set-titles-string "#S:#I:#W - #T"

# -----------------------------------------------------------------------------
# Indexing — start panes and windows at 1 instead of 0
# -----------------------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1

# -----------------------------------------------------------------------------
# Vim-like pane navigation
# -----------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-like splits — keep current path
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current path
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# Copy mode — vim style
# -----------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# -----------------------------------------------------------------------------
# Reload config
# -----------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# -----------------------------------------------------------------------------
# Gruvbox (dark, medium contrast) theme (https://github.com/ellisonleao/gruvbox.nvim)
# The theme file is symlinked into ~/.config/tmux by bootstrap.sh.
# -----------------------------------------------------------------------------
set -g status-interval 5
set -g status-position bottom
source-file ~/.config/tmux/gruvbox-dark.tmuxtheme

# -----------------------------------------------------------------------------
# Plugins (TPM — Tmux Plugin Manager)
# Install TPM, then press <prefix> + I to install plugins.
# -----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence: resurrect saves/restores sessions, continuum automates
# it (periodic save + restore on server start). Without these the two plugins
# above are inert. Capture pane contents so scrollback survives a restore.
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
